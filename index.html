        loader.style.display = "none";
        document.body.classList.remove("hide-content");
      }, 500);
    }, 1500); // Minimale tijd
  });
</script>

body:not(.hide-content) .section h1,
body:not(.hide-content) .section a {
  opacity: 1;

}
